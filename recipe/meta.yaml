{% set name = "pyflowchart" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyflowchart-{{ version }}.tar.gz
  sha256: 4c80bdc62389600e63d558dc27d694bffd3b82e87bacbb793ed2e4423e93f2b9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.6
    - pip
  run:
    - python >=3.6
    - astunparse
    - chardet

test:
  imports:
    - pyflowchart
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/cdfmlr/pyflowchart
  summary: Python codes to Flowcharts.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
